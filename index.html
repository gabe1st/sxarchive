<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sumxmo</title>
    <link rel="icon" type="image/gif" href="logo.gif">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        header {
            
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 999;
            background: transparent;
        }

        .logo { 
            width: 210px; 
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.4));
        }

        .museum-container {
            width: 100%;
            padding: 5px;
            column-count: 4; 
            column-gap: 5px; 
        }

        .art-item {
            width: 100%;
            margin-bottom: 5px; 
            break-inside: avoid;
            display: inline-block;
            border: 1px solid #111;
            transition: all 0.3s ease;
            background: #000;
        }

        .art-item img, .art-item video {
            width: 100%;
            height: auto;
            display: block;
        }

        .art-item:hover {
            border: 1px solid #fff;
            transform: scale(1.01);
            z-index: 10;
        }

        @media (max-width: 1024px) { .museum-container { column-count: 3; } }
        @media (max-width: 768px) {
            .museum-container { column-count: 2; }
            .logo { width: 160px; }
        }
        @media (max-width: 480px) { .museum-container { column-count: 1; } }

        footer {
            padding: 100px 20px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 5px;
            opacity: 0.2;
            
.container-das-fotos { 
  display: grid;
  
  grid-template-columns: repeat(3, 1fr); 
  gap: 5px; 
  padding: 5px;
}


.container-das-fotos img {
  width: 100%;
  height: auto;
  display: block;
}
        }
    </style>
</head>
